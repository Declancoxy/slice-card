<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Declan Cox – Slice Internship 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zalando+Sans+Expanded:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      background: #1a1a1a;
      font-family: 'Space Mono', monospace;
    }

    .scene {
      perspective: 1200px;
      width: 320px;
      height: 460px;
      flex-shrink: 0;
    }

    @keyframes cardEntrance {
      from { opacity: 0; transform: scale(0.88) translateY(24px); }
      to   { opacity: 1; transform: scale(1)    translateY(0px);  }
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      cursor: pointer;
      will-change: transform;
    }

    .scene {
      animation: cardEntrance 0.7s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    /* ── FRONT ── */
    .front {
      background: linear-gradient(
        145deg,
        #f7f6f5 0%,
        #fefefe 18%,
        #eeece9 32%,
        #fafaf9 48%,
        #f0efed 62%,
        #fefefe 78%,
        #ebe9e6 100%
      );
      border: 1px solid #dedad4;
      display: flex;
      flex-direction: column;
      transform: rotateY(0deg);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .sheen {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      border-radius: 18px;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .scene:hover .sheen {
      opacity: 1;
    }

    .front-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 26px 26px 28px;
      position: relative;
      z-index: 2;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .internship-label {
      font-size: 9px;
      font-weight: 700;
      color: #111;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .slice-logo {
      display: block;
      width: 34px;
      height: auto;
    }

    .middle {
      display: flex;
      flex-direction: column;
    }

    .main-name {
      font-family: 'Zalando Sans Expanded', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #111;
      letter-spacing: 0px;
      line-height: 1.05;
      margin-bottom: 2px;
    }

    .name-underline {
      width: 68%;
      height: 8px;
      display: block;
      margin-bottom: 10px;
    }

    .role-label {
      font-size: 9px;
      font-weight: 700;
      color: #111;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .summer-label {
      font-size: 9px;
      font-weight: 700;
      color: #111;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── BACK ── */
    .back {
      background-color: #F5C518;
      background-image: radial-gradient(circle, rgba(0,0,0,0.10) 1px, transparent 1px);
      background-size: 18px 18px;
      transform: rotateY(180deg);
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .back-logo {
      width: 90px;
      height: auto;
      display: block;
    }

    .hint {
      font-size: 9px;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .handle {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: #555;
      letter-spacing: 1.5px;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .handle:hover {
      color: #F5C518;
    }
  </style>
</head>

          <div class="role-label">Product Design</div>

<script>
  const scene  = document.getElementById('scene');
  const card   = document.getElementById('card');
  const sheen  = document.getElementById('sheen');

  let flipped   = false;
  let animating = false;
  let tx = 0, ty = 0;
  let cx = 0, cy = 0;
  let vx = 0, vy = 0;
  let mx = 0, my = 0; // raw mouse position for magnetic pull

  const STIFFNESS = 0.06;
  const DAMPING   = 0.74;

  // ── Dynamic shadow ───────────────────────────────────────────────────
  const shadowEl = document.createElement('div');
  shadowEl.style.cssText = `
    position:absolute; bottom:-28px; left:50%; transform:translateX(-50%);
    width:260px; height:40px;
    background:radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,0,0,0.45) 0%, transparent 70%);
    border-radius:50%; pointer-events:none; transition:opacity 0.3s;
    filter:blur(6px);
  `;
  scene.style.position = 'relative';
  scene.appendChild(shadowEl);

  function updateShadow(rotX, rotY) {
    const sx = rotY * 1.2;
    const sy = -rotX * 0.8;
    const spread = 220 + Math.abs(rotY) * 2;
    shadowEl.style.transform = `translateX(calc(-50% + ${sx}px)) translateY(${sy}px)`;
    shadowEl.style.width = spread + 'px';
  }

  // ── Sheen ────────────────────────────────────────────────────────────
  function updateSheen(nx, ny) {
    const px = Math.round(nx * 100);
    const py = Math.round(ny * 100);
    sheen.style.background = `
      radial-gradient(ellipse 35% 25% at ${px}% ${py}%,
        rgba(255,255,255,0.72) 0%,
        rgba(255,255,255,0.18) 40%,
        transparent 70%
      )
    `;
  }

  // ── Particle burst on flip — particles spawn around the card edges ────
  function burst() {
    const rect   = scene.getBoundingClientRect();
    const colours = ['#F5C518','#FFD84D','#FFF0A0','#ffffff','#FFCC00'];
    const count   = 28;

    for (let i = 0; i < count; i++) {
      const dot = document.createElement('div');
      const size = 3 + Math.random() * 5;

      // Pick a random point along the card perimeter
      const perimeter = 2 * (rect.width + rect.height);
      const pos       = Math.random() * perimeter;
      let sx, sy; // spawn position (fixed coords)

      if (pos < rect.width) {
        // top edge
        sx = rect.left + pos;
        sy = rect.top;
      } else if (pos < rect.width + rect.height) {
        // right edge
        sx = rect.right;
        sy = rect.top + (pos - rect.width);
      } else if (pos < 2 * rect.width + rect.height) {
        // bottom edge
        sx = rect.right - (pos - rect.width - rect.height);
        sy = rect.bottom;
      } else {
        // left edge
        sx = rect.left;
        sy = rect.bottom - (pos - 2 * rect.width - rect.height);
      }

      // Direction: outward from the nearest edge, with some spread
      const normX  = sx - (rect.left + rect.width  / 2);
      const normY  = sy - (rect.top  + rect.height / 2);
      const len    = Math.sqrt(normX * normX + normY * normY);
      const spread = (Math.random() - 0.5) * 1.2;
      const speed  = 30 + Math.random() * 55;
      const tx     = ((normX / len) + spread) * speed;
      const ty     = ((normY / len) + spread) * speed;

      const colour = colours[Math.floor(Math.random() * colours.length)];

      dot.style.cssText = `
        position:fixed;
        left:${sx}px; top:${sy}px;
        width:${size}px; height:${size}px;
        border-radius:50%;
        background:${colour};
        pointer-events:none;
        z-index:9999;
        transform:translate(-50%,-50%);
        transition:transform 0.65s cubic-bezier(0.15,0.8,0.35,1), opacity 0.65s ease;
      `;
      document.body.appendChild(dot);

      requestAnimationFrame(() => {
        dot.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
        dot.style.opacity   = '0';
      });

      setTimeout(() => dot.remove(), 700);
    }
  }

  // ── Load shimmer sweep ───────────────────────────────────────────────
  function loadSweep() {
    const sweep = document.createElement('div');
    sweep.style.cssText = `
      position:absolute; inset:0; border-radius:18px; pointer-events:none; z-index:20; overflow:hidden;
    `;
    const glint = document.createElement('div');
    glint.style.cssText = `
      position:absolute; top:0; left:-80%; width:60%; height:100%;
      background:linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.55) 50%, transparent 70%);
      transform:skewX(-15deg);
      transition: left 0.7s ease;
    `;
    sweep.appendChild(glint);
    card.appendChild(sweep);
    setTimeout(() => { glint.style.left = '130%'; }, 200);
    setTimeout(() => sweep.remove(), 1000);
  }

  // ── Mouse tracking ───────────────────────────────────────────────────
  // ── Desktop: mouse ───────────────────────────────────────────────────
  scene.addEventListener('mousemove', e => {
    if (animating) return;
    const r  = scene.getBoundingClientRect();
    const nx = (e.clientX - r.left) / r.width;
    const ny = (e.clientY - r.top)  / r.height;
    tx =  (nx - 0.5) * 28;
    ty = -(ny - 0.5) * 22;
    mx = (nx - 0.5) * 10;
    my = (ny - 0.5) * 10;
    if (!flipped) updateSheen(nx, ny);
  });

  scene.addEventListener('mouseleave', () => {
    tx = 0; ty = 0; mx = 0; my = 0;
    sheen.style.background = 'none';
  });

  // ── Mobile: gyroscope ─────────────────────────────────────────────────
  let gyroEnabled = false;

  function initGyro() {
    window.addEventListener('deviceorientation', e => {
      if (animating) return;
      // beta  = front-back tilt (-180 to 180), gamma = left-right (-90 to 90)
      const beta  = Math.max(-30, Math.min(30, e.beta  - 30)); // offset for natural hold angle
      const gamma = Math.max(-30, Math.min(30, e.gamma));
      tx =  (gamma / 30) * 22;
      ty = -(beta  / 30) * 18;
      // Sheen follows tilt on gyro too
      if (!flipped) {
        const nx = (gamma / 30 + 1) / 2;
        const ny = (beta  / 30 + 1) / 2;
        updateSheen(nx, ny);
      }
    }, true);
    gyroEnabled = true;
  }

  // Gyro setup
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  if (isMobile && typeof DeviceOrientationEvent !== 'undefined') {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      // iOS 13+ — show a visible button to trigger permission
      const gyroBtn = document.createElement('button');
      gyroBtn.textContent = 'Enable tilt';
      gyroBtn.style.cssText = `
        font-family: 'Space Mono', monospace;
        font-size: 9px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #F5C518;
        background: none;
        border: 1px solid #F5C518;
        border-radius: 20px;
        padding: 6px 14px;
        cursor: pointer;
        margin-top: 4px;
      `;
      // Insert after hint
      const hint = document.querySelector('.hint');
      hint.parentNode.insertBefore(gyroBtn, hint.nextSibling);

      gyroBtn.addEventListener('click', () => {
        DeviceOrientationEvent.requestPermission()
          .then(state => {
            if (state === 'granted') {
              initGyro();
              gyroBtn.remove();
            }
          })
          .catch(() => {});
      });
    } else {
      // Android — auto start, no permission needed
      initGyro();
    }
  }

  // Touch drag removed — gyroscope only on mobile.
  // If gyro unavailable, card sits still rather than dragging awkwardly.

  // ── Flip ─────────────────────────────────────────────────────────────
  // ── Flip sound — warm woody thud with gentle resonance ─────────────
  // Think: Animal Crossing UI meets a Dieter Rams tactile click
  function playFlipSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const t   = ctx.currentTime;

      // ── Body: warm rounded thud (the Rams click) ──────────────────
      // Triangle wave is softer and rounder than sine at low freqs
      const body     = ctx.createOscillator();
      const bodyGain = ctx.createGain();
      const bodyLPF  = ctx.createBiquadFilter();

      bodyLPF.type            = 'lowpass';
      bodyLPF.frequency.value = 400;
      bodyLPF.Q.value         = 1.2;

      body.type = 'triangle';
      body.frequency.setValueAtTime(200, t);
      body.frequency.exponentialRampToValueAtTime(90, t + 0.08);

      // Punchy but rounded envelope — fast attack, medium decay
      bodyGain.gain.setValueAtTime(0.0, t);
      bodyGain.gain.linearRampToValueAtTime(0.18, t + 0.008);
      bodyGain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);

      body.connect(bodyLPF);
      bodyLPF.connect(bodyGain);
      bodyGain.connect(ctx.destination);
      body.start(t);
      body.stop(t + 0.20);

      // ── Tail: airy sine overtone (the AC warmth) ──────────────────
      const tail     = ctx.createOscillator();
      const tailGain = ctx.createGain();

      tail.type = 'sine';
      tail.frequency.setValueAtTime(340, t);
      tail.frequency.exponentialRampToValueAtTime(240, t + 0.25);

      tailGain.gain.setValueAtTime(0.0, t);
      tailGain.gain.linearRampToValueAtTime(0.04, t + 0.015);
      tailGain.gain.exponentialRampToValueAtTime(0.001, t + 0.30);

      tail.connect(tailGain);
      tailGain.connect(ctx.destination);
      tail.start(t);
      tail.stop(t + 0.32);

    } catch(e) {}
  }

  card.addEventListener('click', () => {
    if (animating) return;
    flipped   = !flipped;
    animating = true;
    vx = 0; vy = 0; cx = 0; cy = 0;
    tx = 0; ty = 0; mx = 0; my = 0;

    burst();
    playFlipSound();

    card.style.transition = 'transform 0.75s cubic-bezier(0.23, 1, 0.32, 1)';
    card.style.transform  = flipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
    setTimeout(() => {
      card.style.transition = 'none';
      animating = false;
    }, 780);
  });

  // ── Spring loop ───────────────────────────────────────────────────────
  let smx = 0, smy = 0; // smoothed magnetic position
  (function loop() {
    if (!animating) {
      const ax = (tx - cx) * STIFFNESS;
      const ay = (ty - cy) * STIFFNESS;
      vx = (vx + ax) * DAMPING;
      vy = (vy + ay) * DAMPING;
      cx += vx;
      cy += vy;

      // Smooth magnetic drift
      smx += (mx - smx) * 0.08;
      smy += (my - smy) * 0.08;

      const base = flipped ? 180 : 0;
      card.style.transform = `
        translate(${smx}px, ${smy}px)
        rotateY(${base + cx}deg)
        rotateX(${cy}deg)
      `;
      updateShadow(cy, cx);
    }
    requestAnimationFrame(loop);
  })();

  // Trigger load sweep after a short delay
  window.addEventListener('load', () => setTimeout(loadSweep, 400));
</script>
